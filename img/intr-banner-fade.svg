        <path d="M590 12 Q598 9 606 12" fill="none" stroke="#444" stroke-width="1"/>
        <circle cx="579" cy="18" r="1.2" fill="#555"/>
        <text x="598" y="93" text-anchor="middle" dominant-baseline="central"
