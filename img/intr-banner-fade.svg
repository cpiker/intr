          <polyline points="622,25.0  632,25.0  634,29"/>
          <polyline points="622,29.5  632,29.5  634,33.5"/>
          <polyline points="622,34.0  632,34.0  634,38"/>
          <polyline points="622,38.5  632,38.5  634,42.5"/>
